name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  backend:
    name: Backend — lint + tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/requirements-dev.txt
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements-dev.txt ruff
      - name: Lint (errors only — syntax + undefined names)
        run: ruff check --select E9,F63,F7,F82 .
      - name: Run tests
        run: pytest

  frontend:
    name: Frontend — JS syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - name: Syntax-check all page scripts
        run: |
          for f in frontend/static/js/*.js; do
            echo "checking $f"
            node --check "$f"
          done

  docker:
    name: Docker — build image
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Build production image
        run: docker build -t sentinel:ci .
